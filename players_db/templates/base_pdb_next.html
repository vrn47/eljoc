<!DOCTYPE html>
<html lang="en">

  <style>
    
    .eljoc-container {
      position: relative;
      text-align: center;
    }

    .eljoc-banner {
      position: relative;
      text-align: center;
      overflow: hidden;
    }

    .eljoc-banner-img {
      width: 100%;
      max-height: 150px;
    }

    .eljoc-banner-title {
      position: absolute;
      top: 50%;
      left: 50%;
      transform:translate(-50%,-50%);
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: 4px;
    }

    .bronze{
      color:#b87333;
      transform:translate(-50%,-50%) translate(4px,4px);
      z-index:1;
    }

    .bronze2{
      color:#b87333;
      transform:translate(-50%,-50%) translate(-4px,-4px);
      z-index:2;

    }
    .bronze3{
      color:#b87333;
      transform:translate(-50%,-50%) translate(-4px,4px);
      z-index:3;

    }
    .bronze4{
      color:#b87333;
      transform:translate(-50%,-50%) translate(4px,-4px);
      z-index:4;
    }

    .silver{
      color:#d8d8d8;
      transform:translate(-50%,-50%) translate(2px,2px);
      z-index:5;
    }

    .silver2{
      color:#d8d8d8;
      transform:translate(-50%,-50%) translate(-2px,-2px);
      z-index:6;
    }

    .silver3{
      color:#d8d8d8;
      transform:translate(-50%,-50%) translate(2px,-2px);
      z-index:7;
    }

    .silver4{
      color:#d8d8d8;
      transform:translate(-50%,-50%) translate(-2px,2px);
      z-index:8;
    }

    .gold{
      z-index:9;
      background:linear-gradient(
          180deg,
          #fff9b0 0%,
          #ffe25a 18%,
          #ffd700 38%,
          #d4af37 65%,
          #8f6500 100%
      );
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      -webkit-text-stroke:.5px #000000;
    }

    .shadow{
      color:#000;
      transform:translate(-50%,-50%) translate(5px,5px);
      opacity:.35;
      filter:blur(3px);
      z-index:0;
    } 

    @media {
      .eljoc-banner-img {
        max-height: 150px;
      }
    }

    .btn-gold {
        background: linear-gradient(135deg, #f4d03f, #d4af37);
        border: 0px solid #b8860b;
        color: #222;
    }

    .btn-gold:hover {
        background: linear-gradient(135deg, #d4af37, #f4d03f);
        border-color: #a67c00;
        color: white;
    }

    .btn-silver {
        background: linear-gradient(135deg, #eeeeee, #c0c0c0);
        border: 0px solid #9aa0a6;
        color: #222;
    }

    .btn-silver:hover {
        background: linear-gradient(135deg, #c0c0c0, #eeeeee);
        border-color: #909090;
        color: white;
    }

    .btn-bronze {
        background: linear-gradient(135deg, #d9985f, #b87333);
        border-color: 0px solid #a05a2c;
        color: #222;
    }

    .btn-bronze:hover {
        background: linear-gradient(135deg, #b87333, #d9985f);
        border-color: #8c4f24;
        color: white;
    }

  </style>
