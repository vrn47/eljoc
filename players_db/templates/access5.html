{% extends 'base_pdb_next.html' %}

{% block banner %}

<div class="eljoc-banner">
    <img src="//imatges.vrn47.cat/Logo/BannerElJoc.png" class="eljoc-banner-img">
    <span class="eljoc-banner-title shadow">Kick off</span>
    <span class="eljoc-banner-title bronze">Kick off</span>
    <span class="eljoc-banner-title silver">Kick off</span>
    <span class="eljoc-banner-title gold">Kick off</span>
</div>

{% endblock %}

{% block content %}

<main class="eljoc-container col-md-6 offset-md-3">
  <div class="row mt-5">
    <form method="POST" class="card card-body txt-gold">
      <div class="">
        {{ error }}
      </div>
      {% csrf_token %}
      <div class="form-floating mb-3">
        <input type="email" name="email" id="email" class="form-control" placeholder="Write your email" required>
        <label for="email"><i class="bi bi-at"></i> Write your email: </label>
      </div>
      <button class="btn btn-gold">
        <i class="bi bi-send"> Send</i>
      </button>
    </form>
    {% if error %}
      <form action="{% url 'register5' %}" class="card card-body">
        {% csrf_token %}
      </form>
    {% endif %}
  </div>
</main>

{% endblock %}
