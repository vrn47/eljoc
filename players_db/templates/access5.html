{% extends 'base_pdb.html' %}

{% block content %}

<style>
  .container2 {
    position: relative;
    text-align: center;
    color: white
  }

  .centered {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .btn-gold {
      background: linear-gradient(135deg, #f4d03f, #d4af37);
      border: 0px solid #b8860b;
      color: #222;
  }

  .btn-gold:hover {
      background: linear-gradient(135deg, #d4af37, #f4d03f);
      border-color: #a67c00;
      color: white;
  }

  .btn-silver {
      background: linear-gradient(135deg, #eeeeee, #c0c0c0);
      border: 0px solid #9aa0a6;
      color: #222;
  }

  .btn-silver:hover {
      background: linear-gradient(135deg, #c0c0c0, #eeeeee);
      border-color: #909090;
      color: white;
  }

  .btn-bronze {
      background: linear-gradient(135deg, #d9985f, #b87333);
      border-color: 0px solid #a05a2c;
      color: #222;
  }

  .btn-bronze:hover {
      background: linear-gradient(135deg, #b87333, #d9985f);
      border-color: #8c4f24;
      color: white;
  }

</style>

<div class="container2">
  <img src="//imatges.vrn47.cat/Logo/Euro-FormBanner24.png" style="width:100%;"">
    <h1 class='centered'>Access</h1>
</div>

<main class=" container">
  <div class="row">
    <div class="col-md-8 offset-md-2 mt-5">
      <form method="POST" class="card card-body">
        <div class="mb-3">
          {{ error }}
        </div>
        {% csrf_token %}
        <div class="form-floating mb-3">
          <input type="email" name="email" id="email" class="form-control" placeholder="Write your email" required>
          <label for="email">Write your email: </label>
        </div>

        <button class="btn btn-gold">
          Login
        </button>
      </form>
      {% if error %}
        <form action="{% url 'register5' %}" class="card card-body">
          {% csrf_token %}
          <button class="btn btn-info">
            Register
          </button>
        </form>
      {% endif %}
    </div>
  </div>
  </main>


  {% endblock %}
