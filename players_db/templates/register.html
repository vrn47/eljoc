{% extends 'base_pdb_next.html' %}

{% block banner %}

<div class="eljoc-banner">
    <img src="//imatges.vrn47.cat/Logo/BannerElJoc.png" class="eljoc-banner-img">
    <span class="eljoc-banner-title shadow">Register</span>
    <span class="eljoc-banner-title bronze">Register</span>
    <span class="eljoc-banner-title bronze2">Register</span>
    <span class="eljoc-banner-title bronze3">Register</span>
    <span class="eljoc-banner-title bronze4">Register</span>
    <span class="eljoc-banner-title silver">Register</span>
    <span class="eljoc-banner-title silver2">Register</span>
    <span class="eljoc-banner-title silver3">Register</span>
    <span class="eljoc-banner-title silver4">Register</span>
    <span class="eljoc-banner-title gold">Register</span>
</div>

{% endblock %}

{% block content %}

<main class="eljoc-container">
  <div class="row">
    <div class="col-md-8 offset-md-2 mt-5">
      <form method="POST" class="card card-body">

        <div class="mb-3">
          {{error}}
        </div>

        {% csrf_token %}

        <div class="form-floating mb-3">
          <input type="email" name="email" id="email" class="form-control" placeholder="Write your email" required>
          <label for="email"><i class="bi bi-at"></i> Email: </label>
          <div class="helptext"></div>
        </div>
        <div class="form-floating mb-3">
          <input type="text" name="fname" id="fname" class="form-control" placeholder="Write your first name" required>
          <label for="fname"><i class="bi bi-person"></i> Name: </label>
          <div class="helptext"></div>
        </div>
        <div class="form-floating mb-3">
          <input type="text" name="lname" id="lname" class="form-control" placeholder="Write your last name" required>
          <label for="lname"><i class="bi bi-person-vcard"></i> Last name: </label>
          <div class="helptext"></div>
        </div>

        <button class="btn btn-gold">
          Register
        </button>
      </form>
    </div>
  </div>
</main>

{% endblock %}
